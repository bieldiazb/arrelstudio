<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0D1A08"/>
  <!-- Grid subtil -->
  <defs>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#639922" stroke-width="0.4" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Orb -->
  <circle cx="900" cy="300" r="300" fill="#639922" opacity="0.06"/>
  <!-- Logo symbol — arrel mark simplificada -->
  <g transform="translate(100, 240)">
    <line x1="60" y1="0" x2="60" y2="120" stroke="#A8E040" stroke-width="8" stroke-linecap="round"/>
    <line x1="60" y1="50" x2="10" y2="10" stroke="#A8E040" stroke-width="6" stroke-linecap="round"/>
    <line x1="60" y1="50" x2="110" y2="10" stroke="#A8E040" stroke-width="6" stroke-linecap="round"/>
    <line x1="60" y1="80" x2="20" y2="60" stroke="#639922" stroke-width="5" stroke-linecap="round"/>
    <line x1="60" y1="80" x2="100" y2="60" stroke="#639922" stroke-width="5" stroke-linecap="round"/>
    <line x1="30" y1="120" x2="90" y2="120" stroke="#A8E040" stroke-width="6" stroke-linecap="round"/>
    <line x1="38" y1="120" x2="28" y2="145" stroke="#639922" stroke-width="4" stroke-linecap="round"/>
    <line x1="60" y1="120" x2="60" y2="148" stroke="#639922" stroke-width="4" stroke-linecap="round"/>
    <line x1="82" y1="120" x2="92" y2="145" stroke="#639922" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- Wordmark -->
  <text x="220" y="290" font-family="'DM Sans', Arial, sans-serif" font-size="90" font-weight="900" fill="#F5F0E8" letter-spacing="-2">ARREL</text>
  <text x="222" y="350" font-family="'DM Sans', Arial, sans-serif" font-size="22" font-weight="400" fill="#639922" letter-spacing="12">STUDIO</text>
  <!-- Tagline -->
  <text x="220" y="430" font-family="'DM Sans', Arial, sans-serif" font-size="22" font-weight="300" fill="#F5F0E8" opacity="0.5">Disseny web per a negocis locals · Bages · Catalunya</text>
  <!-- Preu -->
  <rect x="220" y="460" width="200" height="44" rx="22" fill="#A8E040"/>
  <text x="320" y="488" font-family="'DM Sans', Arial, sans-serif" font-size="16" font-weight="700" fill="#0D1A08" text-anchor="middle" letter-spacing="2">DES DE 29€/MES</text>
  <!-- URL -->
  <text x="1160" y="600" font-family="'DM Sans', Arial, sans-serif" font-size="18" font-weight="400" fill="#639922" text-anchor="end">arrelstudio.cat</text>
</svg>
